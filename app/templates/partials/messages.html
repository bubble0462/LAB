{% if flash %}
    <div class="alert alert-{{ flash.level }}">{{ flash.message }}</div>
{% endif %}

{% if errors %}
    <div class="alert alert-danger">
        <strong>请先修正以下问题：</strong>
        <ul class="error-list">
            {% for error in errors %}
                <li>{{ error }}</li>
            {% endfor %}
        </ul>
    </div>
{% endif %}
