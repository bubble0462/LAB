{% extends "base.html" %}

{% block content %}
<section class="panel">
    <form method="post" action="{{ form_action }}" class="edit-form">
        <div class="form-grid">
            <div class="form-field form-field-wide">
                <label for="name">分类名称 <span class="required">*</span></label>
                <input id="name" type="text" name="name" value="{{ form_data.name }}" required>
            </div>

            <div class="form-field form-field-wide">
                <label for="description">分类说明</label>
                <textarea id="description" name="description" rows="5" placeholder="可填写该分类适用范围、常见器件类型等">{{ form_data.description }}</textarea>
            </div>
        </div>

        <div class="toolbar-actions">
            <a href="{{ request.url_for('category_list') }}" class="btn btn-light">取消</a>
            <button type="submit" class="btn btn-primary">{{ submit_label }}</button>
        </div>
    </form>
</section>
{% endblock %}
